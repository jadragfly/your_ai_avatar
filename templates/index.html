<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Avatar - 3D 虚拟形象聊天</title>
    <style>
        /* ==================== 全局样式 ==================== */
        :root {
            --primary-color: #6c5ce7;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #2d2d44;
            --success-color: #00d9a5;
            --error-color: #ff6b6b;
            --warning-color: #ffd93d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* ==================== 主容器布局 ==================== */
        .container {
            display: flex;
            height: 100vh;
        }

        /* ==================== 左侧 3D 场景区域 ==================== */
        .scene-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
        }

        #canvas-container canvas {
            display: block;
        }

        /* 加载提示 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 15, 26, 0.9);
            z-index: 100;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: var(--text-secondary);
        }

        /* 语音气泡 */
        .speech-bubble {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #333;
            padding: 15px 25px;
            border-radius: 20px;
            max-width: 80%;
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }

        .speech-bubble.visible {
            opacity: 1;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: white;
        }

        /* 表情按钮组 */
        .expression-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(26, 26, 46, 0.9);
        }

        .expr-btn {
            font-size: 24px;
            padding: 10px 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
        }

        .expr-btn:hover {
            border-color: var(--primary-color);
            transform: scale(1.1);
            background: rgba(108, 92, 231, 0.2);
        }

        .expr-btn:active {
            transform: scale(0.95);
        }

        /* 快捷功能按钮 */
        .quick-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(26, 26, 46, 0.95);
        }

        .quick-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            border-color: var(--primary-color);
            color: var(--text-primary);
            background: rgba(108, 92, 231, 0.1);
        }

        /* ==================== 右侧聊天区域 ==================== */
        .chat-container {
            width: 380px;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .chat-header h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .chat-header .subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 状态指示器 */
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 13px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .status-dot.idle {
            background: var(--success-color);
        }

        .status-dot.thinking {
            background: var(--warning-color);
            animation: pulse 1s infinite;
        }

        .status-dot.speaking {
            background: var(--primary-color);
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 聊天记录 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-content {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.user .message-content {
            background: var(--primary-color);
            border-bottom-right-radius: 5px;
        }

        .message.assistant .message-content {
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 5px;
        }

        /* 思考中动画 */
        .thinking-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            border-bottom-left-radius: 5px;
        }

        .thinking-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .thinking-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        /* 聊天输入区 */
        .chat-input-container {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #chat-input:focus {
            border-color: var(--primary-color);
        }

        #chat-input::placeholder {
            color: var(--text-secondary);
        }

        #send-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: var(--primary-color);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #send-btn:hover {
            background: #5a4bd6;
        }

        #send-btn:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }

        /* ==================== 调试面板 ==================== */
        .debug-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
            max-width: 300px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .debug-panel.visible {
            display: block;
        }

        .debug-panel .log-entry {
            margin-bottom: 3px;
            color: #0f0;
        }

        .debug-panel .log-entry.error {
            color: #f55;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧 3D 场景 -->
        <div class="scene-container">
            <div id="canvas-container">
                <div class="loading-overlay" id="loading">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">正在加载 VRM 模型...</div>
                </div>
                <div class="speech-bubble" id="speech-bubble"></div>
            </div>

            <!-- 表情控制 -->
            <div class="expression-controls">
                <button class="expr-btn" onclick="playExpression('happy')" title="开心">😊</button>
                <button class="expr-btn" onclick="playExpression('angry')" title="生气">😠</button>
                <button class="expr-btn" onclick="playExpression('sad')" title="伤心">😢</button>
                <button class="expr-btn" onclick="playExpression('relaxed')" title="放松">😌</button>
                <button class="expr-btn" onclick="playExpression('surprised')" title="惊讶">😲</button>
                <button class="expr-btn" onclick="playExpression('blink')" title="眨眼">👁</button>
                <button class="expr-btn" onclick="playExpression('blinkLeft')" title="左眼眨">👈</button>
                <button class="expr-btn" onclick="playExpression('blinkRight')" title="右眼眨">👉</button>
                <button class="expr-btn" onclick="playExpression('neutral')" title="中性">😐</button>
            </div>

            <!-- 快捷功能 -->
            <div class="quick-actions">
                <button class="quick-btn" onclick="quickAction('joke')">讲笑话</button>
                <button class="quick-btn" onclick="quickAction('sing')">唱首歌</button>
                <button class="quick-btn" onclick="quickAction('dance')">跳舞</button>
                <button class="quick-btn" onclick="quickAction('praise')">夸奖</button>
            </div>
        </div>

        <!-- 右侧聊天区域 -->
        <div class="chat-container">
            <div class="chat-header">
                <h2>🤖 AI Avatar</h2>
                <div class="subtitle">基于 {{{AI_MODEL_NAME}}} 的 3D 虚拟形象</div>
            </div>

            <div class="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">待机中</span>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message assistant">
                    <div class="message-content">你好！我是你的 AI Avatar 助手。有什么我可以帮你的吗？</div>
                </div>
            </div>

            <div class="chat-input-container">
                <input type="text" id="chat-input" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                <button id="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <!-- 调试面板 -->
    <div class="debug-panel" id="debug-panel"></div>

    <!-- Three.js Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.3/lib/three-vrm.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRM, VRMLoaderPlugin } from '@pixiv/three-vrm';

        // ==================== 配置 ====================
        const CONFIG = {
            API_URL: '{{{API_URL}}}',
            API_PATH: '{{{API_PATH}}}',
            MODEL: '{{{MODEL}}}',
            DEBUG: false
        };

        // ==================== 调试日志 ====================
        function log(...args) {
            console.log('[Avatar]', ...args);
            if (CONFIG.DEBUG) {
                const debugPanel = document.getElementById('debug-panel');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.textContent = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
                debugPanel.appendChild(entry);
                debugPanel.scrollTop = debugPanel.scrollHeight;
            }
        }

        function logError(...args) {
            console.error('[Avatar]', ...args);
            if (CONFIG.DEBUG) {
                const debugPanel = document.getElementById('debug-panel');
                const entry = document.createElement('div');
                entry.className = 'log-entry error';
                entry.textContent = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
                debugPanel.appendChild(entry);
            }
        }

        // 调试模式切换
        window.debugMode = false;
        window.toggleDebug = function() {
            window.debugMode = !window.debugMode;
            CONFIG.DEBUG = window.debugMode;
            document.getElementById('debug-panel').classList.toggle('visible', window.debugMode);
            log('调试模式:', window.debugMode ? '开启' : '关闭');
        };

        // 监听 /debug 命令
        const originalLog = log;
        window.log = function(...args) {
            originalLog(...args);
            const msg = args.join(' ');
            if (msg.includes('/debug on')) {
                window.toggleDebug();
            }
        };

        log('AI Avatar Web 启动中...');

        // ==================== 场景设置 ====================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(
            30,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        // 轨道控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.maxPolarAngle = Math.PI / 2;
        controls.minDistance = 1;
        controls.maxDistance = 10;

        // 灯光（参考 ai-avatar-web 的设置）
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
        directionalLight.position.set(2, 5, 3);
        scene.add(directionalLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
        fillLight.position.set(-2, 2, -2);
        scene.add(fillLight);

        // 地面
        const groundGeometry = new THREE.CircleGeometry(3, 64);
        const groundMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a2e,
            transparent: true,
            opacity: 0.5
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        scene.add(ground);

        // 时钟
        const clock = new THREE.Clock();

        // VRM 相关
        let vrm = null;
        let mixer = null;

        // ==================== 加载 VRM 模型 ====================
        async function loadVRM() {
            log('开始加载 VRM 模型...');

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            const possiblePaths = [
                './sample.vrm',
                '../sample.vrm',
                '../../sample.vrm',
                'https://pixiv.github.io/three-vrm/packages/three-vrm/examples/models/VRM1_Constraint_Twist_Sample.vrm'
            ];

            for (const path of possiblePaths) {
                try {
                    log('尝试加载:', path);
                    const result = await new Promise((resolve, reject) => {
                        loader.load(
                            path,
                            (gltf) => resolve(gltf),
                            (progress) => log('加载进度:', (progress.loaded / progress.total * 100).toFixed(1) + '%'),
                            (error) => reject(error)
                        );
                    });

                    // 从 gltf.userData.vrm 获取 VRM 实例
                    vrm = result.userData.vrm;
                    if (!vrm) {
                        log('从', path, '加载失败: 未找到 VRM 实例');
                        continue;
                    }

                    scene.add(vrm.scene);
                    log('成功从:', path, '加载模型');

                    // 居中模型
                    const box = new THREE.Box3().setFromObject(vrm.scene);
                    const center = box.getCenter(new THREE.Vector3());
                    vrm.scene.position.sub(center);
                    vrm.scene.position.y += (box.max.y - box.min.y) / 2;

                    break;
                } catch (error) {
                    log('从', path, '加载失败:', error.message);
                }
            }

            if (vrm) {
                document.getElementById('loading').classList.add('hidden');
                initExpressions();
                initLookAtTracking();
                initIdleExpression();
                log('VRM 模型加载完成!');
            } else {
                logError('所有路径加载失败');
            }
        }

        // ==================== 表情系统 ====================
        let currentExpression = null;
        let isSpeaking = false;

        function initExpressions() {
            if (!vrm || !vrm.expressionManager) return;

            log('初始化表情系统...');
            showSpeechBubble('我来啦！👋');
            playExpression('happy');

            // 启动自动眨眼
            startAutoBlink();

            // 启动待机动画
            startIdleAnimation();
        }

        // 初始化待机表情（睁眼作为默认）
        function initIdleExpression() {
            if (!vrm || !vrm.expressionManager) return;

            // 设置 neutral 表情（睁眼状态）作为默认
            const neutralExpr = vrm.expressionManager.getExpression('neutral');
            if (neutralExpr) {
                neutralExpr.weight = 1.0;
            }

            // 关闭所有眨眼相关表情
            ['blink', 'blinkLeft', 'blinkRight'].forEach(name => {
                const expr = vrm.expressionManager.getExpression(name);
                if (expr) expr.weight = 0;
            });
        }

        // ==================== 自动眨眼系统 ====================
        let blinkTimer = null;
        let nextBlinkTime = 0;
        let isBlinking = false;
        let blinkProgress = 0;

        function startAutoBlink() {
            if (!vrm || !vrm.expressionManager) return;

            // 随机 3-6 秒眨眼一次
            scheduleNextBlink();
            log('自动眨眼系统已启动');
        }

        function scheduleNextBlink() {
            // 随机 3-6 秒
            const delay = 3000 + Math.random() * 3000;
            setTimeout(() => {
                if (!isSpeaking) { // 说话时不眨眼
                    triggerBlink();
                }
                scheduleNextBlink();
            }, delay);
        }

        function triggerBlink() {
            if (!vrm || isBlinking) return;

            isBlinking = true;
            blinkProgress = 0;

            const blinkDuration = 150; // 眨眼总时长
            const startTime = performance.now();

            function animateBlink() {
                const elapsed = performance.now() - startTime;
                blinkProgress = elapsed / blinkDuration;

                if (blinkProgress < 0.5) {
                    // 闭合
                    const closeWeight = blinkProgress * 2;
                    setExpression('blink', closeWeight);
                    setExpression('blinkLeft', closeWeight);
                    setExpression('blinkRight', closeWeight);
                } else {
                    // 张开
                    const openWeight = (1 - blinkProgress) * 2;
                    setExpression('blink', openWeight);
                    setExpression('blinkLeft', openWeight);
                    setExpression('blinkRight', openWeight);
                }

                if (blinkProgress < 1) {
                    requestAnimationFrame(animateBlink);
                } else {
                    // 重置
                    setExpression('blink', 0);
                    setExpression('blinkLeft', 0);
                    setExpression('blinkRight', 0);
                    isBlinking = false;
                }
            }

            requestAnimationFrame(animateBlink);
        }

        // ==================== 视线追踪系统 ====================
        let mouseX = 0;
        let mouseY = 0;
        let currentLookAt = { x: 0, y: 0 };

        function initLookAtTracking() {
            if (!vrm || !vrm.lookAtApplicant) return;

            // 监听鼠标移动
            container.addEventListener('mousemove', (e) => {
                const rect = container.getBoundingClientRect();
                mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            });

            log('视线追踪系统已启动');
        }

        function updateLookAt(delta) {
            if (!vrm || !vrm.lookAtApplicant || isSpeaking) return;

            // 平滑追踪
            const smoothing = 0.05;
            currentLookAt.x += (mouseX - currentLookAt.x) * smoothing;
            currentLookAt.y += (mouseY - currentLookAt.y) * smoothing;

            // 限制范围
            const maxAngle = 0.5; // 最大角度
            const lookX = Math.max(-maxAngle, Math.min(maxAngle, currentLookAt.x));
            const lookY = Math.max(-maxAngle, Math.min(maxAngle, currentLookAt.y));

            // 应用到 VRM
            vrm.lookAtApplicant.lookAt(lookX, lookY);
        }

        // ==================== 唇形同步系统 ====================
        let lipSyncValue = 0;
        let lipSyncTarget = 0;
        let lastSpeechTime = 0;

        function onSpeechStart() {
            isSpeaking = true;
            lipSyncTarget = 1;
            lastSpeechTime = performance.now();
        }

        function onSpeechEnd() {
            isSpeaking = false;
            lipSyncTarget = 0;
        }

        function updateLipSync(delta) {
            if (!vrm || !vrm.expressionManager) return;

            // 平滑过渡
            const smoothing = 0.1;
            lipSyncValue += (lipSyncTarget - lipSyncValue) * smoothing;

            // 说话时嘴巴动
            if (isSpeaking) {
                // 根据时间生成随机口型
                const time = performance.now() * 0.01;
                const morphValue = (Math.sin(time * 3) * 0.3 + 0.5) * lipSyncValue;

                // 尝试设置口型表情
                const aaExpr = vrm.expressionManager.getExpression('aa');
                if (aaExpr) {
                    aaExpr.weight = morphValue * 0.6;
                }

                // 超过5秒没说话就停止
                if (performance.now() - lastSpeechTime > 5000) {
                    onSpeechEnd();
                }
            } else {
                // 重置口型
                const aaExpr = vrm.expressionManager.getExpression('aa');
                if (aaExpr) {
                    aaExpr.weight *= 0.9;
                }
            }
        }

        // ==================== 待机动画系统 ====================
        let idleTime = 0;
        let idleAnimationPhase = 0;

        function startIdleAnimation() {
            log('待机动画系统已启动');
        }

        function updateIdleAnimation(delta) {
            if (!vrm || !vrm.scene) return;

            idleTime += delta;
            idleAnimationPhase = Math.sin(idleTime * 0.5) * 0.02; // 缓慢的呼吸效果

            // 轻微的上下浮动
            if (vrm.scene.position) {
                vrm.scene.position.y = idleAnimationPhase;
            }

            // 轻微的头部晃动
            if (vrm.scene.rotation) {
                const headWobble = Math.sin(idleTime * 0.3) * 0.01;
                vrm.scene.rotation.z = headWobble;
            }
        }

        // ==================== 表情控制 ====================
        function setExpression(name, weight = 1.0) {
            if (!vrm || !vrm.expressionManager) return;

            try {
                const expression = vrm.expressionManager.getExpression(name);
                if (expression) {
                    expression.weight = weight;
                }
            } catch (e) {
                log('表情', name, '不可用');
            }
        }

        function playExpression(name) {
            log('播放表情:', name);

            // 先重置所有主要表情到睁眼状态
            ['happy', 'angry', 'sad', 'relaxed', 'surprised', 'neutral'].forEach(expr => {
                setExpression(expr, 0);
            });

            // 设置新表情
            setExpression(name, 1.0);

            // 2秒后恢复睁眼待机状态
            setTimeout(() => {
                setExpression(name, 0);
                initIdleExpression();
            }, 2000);
        }

        // ==================== 语音气泡 ====================
        let speechBubbleTimer = null;

        function showSpeechBubble(text) {
            const bubble = document.getElementById('speech-bubble');
            bubble.textContent = text;
            bubble.classList.add('visible');

            if (speechBubbleTimer) clearTimeout(speechBubbleTimer);
            speechBubbleTimer = setTimeout(() => {
                bubble.classList.remove('visible');
            }, 5000);
        }

        // ==================== 状态更新 ====================
        function updateStatus(status) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');

            dot.className = 'status-dot ' + status;
            text.textContent = {
                idle: '待机中',
                thinking: '思考中...',
                speaking: '说话中'
            }[status] || '待机中';
        }

        // ==================== 聊天功能 ====================
        let conversationHistory = [];

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!message) return;

            input.value = '';
            addMessage('user', message);
            updateStatus('thinking');

            // 添加到历史
            conversationHistory.push({ role: 'user', content: message });

            // 显示思考中
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message assistant';
            thinkingDiv.innerHTML = '<div class="thinking-indicator"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>';
            document.getElementById('chat-messages').appendChild(thinkingDiv);
            scrollToBottom();

            try {
                const response = await fetch(CONFIG.API_URL + CONFIG.API_PATH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        messages: conversationHistory,
                        temperature: 0.7,
                        max_tokens: 2048
                    })
                });

                thinkingDiv.remove();

                if (!response.ok) {
                    throw new Error(`API 请求失败: ${response.status}`);
                }

                const data = await response.json();
                const assistantMessage = data.choices?.[0]?.message?.content || '抱歉，我没有收到回复。';

                addMessage('assistant', assistantMessage);
                conversationHistory.push({ role: 'assistant', content: assistantMessage });

                // 角色反应
                updateStatus('speaking');
                onSpeechStart(); // 开始唇形同步
                showSpeechBubble(assistantMessage.substring(0, 50) + (assistantMessage.length > 50 ? '...' : ''));

                setTimeout(() => {
                    updateStatus('idle');
                    onSpeechEnd(); // 停止唇形同步
                }, 3000);

                scrollToBottom();

            } catch (error) {
                thinkingDiv.remove();
                addMessage('assistant', `抱歉，发生了错误: ${error.message}`);
                log('聊天错误:', error);
                updateStatus('idle');
                onSpeechEnd(); // 停止唇形同步
            }
        }

        function addMessage(role, content) {
            const messagesDiv = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="message-content">${content.replace(/\n/g, '<br>')}</div>`;
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            const messagesDiv = document.getElementById('chat-messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // ==================== 快捷功能 ====================
        async function quickAction(action) {
            const prompts = {
                joke: '请讲一个有趣的笑话',
                sing: '请唱一首简单的歌',
                dance: '描述一段欢快的舞蹈动作',
                praise: '请夸奖一下我'
            };

            document.getElementById('chat-input').value = prompts[action];
            sendMessage();
        }

        // ==================== 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // 更新 VRM 动画
            if (vrm) {
                vrm.update(delta);

                // 更新视线追踪
                updateLookAt(delta);

                // 更新唇形同步
                updateLipSync(delta);

                // 更新待机动画
                updateIdleAnimation(delta);
            }

            // 更新混合器
            if (mixer) {
                mixer.update(delta);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // ==================== 窗口调整 ====================
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // ==================== 暴露全局函数（供 HTML onclick 调用）====================
        window.playExpression = playExpression;
        window.quickAction = quickAction;
        window.handleKeyPress = handleKeyPress;
        window.sendMessage = sendMessage;

        // ==================== 启动 ====================
        loadVRM();
        animate();
        log('AI Avatar Web 启动完成!');

    </script>
</body>
</html>
